<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A Vite, Tailwind CSS, and Alpine.js starter template with GitHub Pages support."
    />
    <title>Alpine Tailwind Vite Template</title>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <main x-data="counterApp" class="page-shell">
      <section class="counter-shell" aria-labelledby="counter-title">
        <div class="counter-card">
          <p class="eyebrow">Alpine counter</p>
          <h1
            id="counter-title"
            class="mt-4 text-4xl font-semibold tracking-tight text-foreground sm:text-5xl"
          >
            Alpine JS + Tailwind CSS + Vite template
          </h1>
          <p class="mt-3 text-base leading-7 text-muted-foreground sm:text-lg">
            Use this as the default starter template for new GitHub projects
            that use Alpine.js, Tailwind CSS, and Vite. Github Pages support
            out-of-the-box via <code>npm run deploy</code>. View the source code
            on
            <a
              href="https://github.com/coderkearns/alpine-tailwind-vite-template"
              class="text-primary hover:underline"
              >GitHub</a
            >.
          </p>

          <div
            class="counter-value"
            aria-live="polite"
            aria-atomic="true"
            x-text="count"
          ></div>

          <div class="counter-actions">
            <button
              type="button"
              class="counter-button counter-button-secondary"
              @click="decrement()"
            >
              -1
            </button>
            <button
              type="button"
              class="counter-button counter-button-primary"
              @click="increment()"
            >
              +1
            </button>
          </div>

          <button
            type="button"
            class="mt-4 text-sm font-medium text-muted-foreground transition hover:text-foreground"
            @click="reset()"
          >
            Reset counter
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
