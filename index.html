<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kanban board for managing web development tasks."
    />
    <title>Kanban Board</title>
    <script type="module" crossorigin src="./assets/index-Bb39zZoi.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D1p5jdsM.css">
  </head>
  <body>
    <main x-data="kanbanApp">
      <!-- Header -->
      <header class="kanban-header">
        <h1>Kanban</h1>
        <button @click="refreshSheetData()" class="reload-btn">
          <span class="reload-icon" :class="{ 'spinning': isFetching }">↻</span>
          Reload Sheet
        </button>
      </header>

      <!-- Kanban Board -->
      <div class="kanban-container">
        <!-- Not Started Column -->
        <div class="kanban-column">
          <div
            class="column-header"
            style="background-color: var(--color-column-not-started)"
          >
            Not Started
          </div>
          <div
            class="column-content"
            x-sort.ghost
            x-sort="sortNotStarted"
            x-sort:group="'kanban'"
          >
            <template x-for="item in notStartedColumn" :key="item['Edits']">
              <div
                class="card"
                x-sort:item="item['Edits']"
                @click="openModal(item)"
              >
                <div class="card-title" x-text="item['Contact Name:']"></div>
                <div
                  class="card-subtitle"
                  x-text="formatDate(item[''] || '')"
                ></div>
                <div
                  class="card-link"
                  x-text="truncateUrl(item['URL link for page that needs to be edited/updated:'])"
                ></div>
              </div>
            </template>
          </div>
        </div>

        <!-- In Progress Column -->
        <div class="kanban-column">
          <div
            class="column-header"
            style="background-color: var(--color-column-in-progress)"
          >
            In Progress
          </div>
          <div
            class="column-content"
            x-sort.ghost
            x-sort="sortInProgress"
            x-sort:group="'kanban'"
          >
            <template x-for="item in inProgressColumn" :key="item['Edits']">
              <div
                class="card"
                x-sort:item="item['Edits']"
                @click="openModal(item)"
              >
                <div class="card-title" x-text="item['Contact Name:']"></div>
                <div
                  class="card-subtitle"
                  x-text="formatDate(item[''] || '')"
                ></div>
                <div
                  class="card-link"
                  x-text="truncateUrl(item['URL link for page that needs to be edited/updated:'])"
                ></div>
              </div>
            </template>
          </div>
        </div>

        <!-- Waiting Column -->
        <div class="kanban-column">
          <div
            class="column-header"
            style="background-color: var(--color-column-waiting)"
          >
            Waiting
          </div>
          <div
            class="column-content"
            x-sort.ghost
            x-sort="sortWaiting"
            x-sort:group="'kanban'"
          >
            <template x-for="item in waitingColumn" :key="item['Edits']">
              <div
                class="card"
                x-sort:item="item['Edits']"
                @click="openModal(item)"
              >
                <div class="card-title" x-text="item['Contact Name:']"></div>
                <div
                  class="card-subtitle"
                  x-text="formatDate(item[''] || '')"
                ></div>
                <div
                  class="card-link"
                  x-text="truncateUrl(item['URL link for page that needs to be edited/updated:'])"
                ></div>
              </div>
            </template>
          </div>
        </div>

        <!-- Done Column -->
        <div class="kanban-column done-column">
          <div class="column-header">Done</div>
          <div
            class="column-content"
            x-sort.ghost
            x-sort="deleteItem"
            x-sort:group="'kanban'"
          >
            <div class="trash-icon" x-sort:ignore>🗑️</div>
          </div>
        </div>
      </div>

      <!-- Modal -->
      <div
        class="modal-overlay"
        x-show="selectedItem !== null"
        @click="closeModal()"
        style="display: none"
      >
        <div class="modal-content" @click.stop="">
          <button class="modal-close" @click="closeModal()">✕</button>

          <div class="modal-header">
            <h2 x-text="selectedItem?.['Contact Name:'] || ''"></h2>
          </div>

          <div class="modal-body">
            <!-- Contact Info -->
            <div class="modal-section">
              <h3>Contact Information</h3>
              <div class="modal-row">
                <label>Contact Name:</label>
                <span x-text="selectedItem?.['Contact Name:'] || ''"></span>
              </div>
              <div class="modal-row">
                <label>Email:</label>
                <span
                  x-text="selectedItem?.['Contact Email:'] || selectedItem?.['Email Address'] || ''"
                ></span>
              </div>
            </div>

            <!-- URL -->
            <div class="modal-section">
              <h3>URL</h3>
              <a
                :href="selectedItem?.['URL link for page that needs to be edited/updated:']"
                target="_blank"
                class="modal-link"
                x-text="selectedItem?.['URL link for page that needs to be edited/updated:'] || ''"
              ></a>
            </div>

            <!-- Details -->
            <div class="modal-section">
              <h3>Details</h3>
              <div class="modal-row">
                <label>Due Date:</label>
                <span x-text="formatDate(selectedItem?.[''] || '')"></span>
              </div>
              <div
                class="modal-text"
                x-text="selectedItem?.['Edits'] || ''"
              ></div>
            </div>

            <!-- Files -->
            <div
              class="modal-section"
              x-show="selectedItem?.['Photos or files to be added to page (if any):']"
            >
              <h3>Files</h3>
              <div
                class="modal-text"
                x-text="selectedItem?.['Photos or files to be added to page (if any):'] || ''"
              ></div>
            </div>

            <!-- Notes -->
            <div class="modal-section">
              <h3>Notes</h3>
              <textarea
                class="notes-textarea"
                placeholder="Add your notes here..."
                x-model="notes[selectedItem?.['Edits']]"
                @change="saveNote(selectedItem)"
                @input="$el.style.height = 'auto'; $el.style.height = $el.scrollHeight + 'px'"
              ></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button @click="closeModal()" class="btn-secondary">Close</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
